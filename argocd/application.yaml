apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: driftbounty-lite
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tomvinz/Bounty_Drift_Lite.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: driftbounty
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
