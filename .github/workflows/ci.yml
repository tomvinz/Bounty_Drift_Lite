name: Build and Push DriftBounty

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/driftbounty-lite:latest ./app

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/driftbounty-lite:latest
          format: table
          exit-code: 0

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/driftbounty-lite:latest
