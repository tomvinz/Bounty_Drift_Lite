apiVersion: v1
kind: ServiceAccount
metadata:
  name: driftbounty
  namespace: driftbounty
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: driftbounty-reader
rules:
  - apiGroups: [""]
    resources: ["configmaps", "namespaces", "pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: driftbounty-reader-binding
subjects:
  - kind: ServiceAccount
    name: driftbounty
    namespace: driftbounty
roleRef:
  kind: ClusterRole
  name: driftbounty-reader
  apiGroup: rbac.authorization.k8s.io
